<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meglepetés!</title>
<style>
  :root{
    --kraft: #b9d4e8;
    --kraft-dark: #8fb6d6;
    --kraft-shadow: #5c87a8;
    --ink: #1c2e3d;
    --wax: #2d5f8a;
    --wax-dark: #1f425f;
    --cream: #eef5fb;
    --sun: #4f9bd1;
    --sun-deep: #2f78b0;
    --pine: #1d4e63;
    --paper-line: #a9c9e0;
  }

  *{ box-sizing: border-box; }

  html, body{
    margin:0;
    min-height:100vh;
    background: radial-gradient(circle at 20% 15%, #e7f3fb 0%, #c9e2f2 35%, #8fbcdc 75%, #5e93bf 100%);
    font-family: 'Georgia', 'Iowan Old Style', serif;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow-x:hidden;
    padding: 24px;
  }

  .scene{
    position:relative;
    width:100%;
    max-width:560px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:28px;
    --env-w: clamp(300px, 92vw, 460px);
    --env-h: calc(var(--env-w) * 0.6875);
  }

  .hint{
    font-size:0.95rem;
    color: var(--wax-dark);
    letter-spacing:0.04em;
    text-align:center;
    opacity:0.85;
    transition: opacity 0.5s ease;
    min-height: 1.4em;
  }

  /* ---------- ENVELOPE ---------- */

  .envelope-wrap{
    position:relative;
    width: var(--env-w);
    height: var(--env-h);
    cursor:pointer;
    perspective: 1200px;
  }

  .envelope-wrap.opened{
    cursor:default;
  }

  .envelope-body{
    position:absolute;
    inset:0;
    background: linear-gradient(160deg, var(--kraft) 0%, var(--kraft-dark) 100%);
    border-radius: 6px;
    box-shadow:
      0 18px 30px -10px rgba(90, 60, 20, 0.45),
      inset 0 0 0 1px rgba(255,255,255,0.15);
    overflow:hidden;
  }

  .envelope-body::before{
    /* subtle paper fiber texture via repeating lines */
    content:"";
    position:absolute;
    inset:0;
    background-image: repeating-linear-gradient(
      45deg,
      rgba(255,255,255,0.035) 0px,
      rgba(255,255,255,0.035) 2px,
      transparent 2px,
      transparent 6px
    );
    pointer-events:none;
  }

  .pocket-shadow-left,
  .pocket-shadow-right,
  .pocket-shadow-bottom{
    position:absolute;
    background: linear-gradient(160deg, rgba(0,0,0,0.10), rgba(0,0,0,0));
  }

  /* the side/bottom flaps drawn with clip-path triangles to look like a real envelope */
  .flap-side-left{
    position:absolute;
    top:0; left:0;
    width:0; height:0;
    border-style: solid;
    border-width: 110px 160px 110px 0;
    border-color: transparent var(--kraft-dark) transparent transparent;
    opacity:0.0;
  }

  .pocket{
    position:absolute;
    inset:0;
    z-index:3;
    clip-path: polygon(0 100%, 50% 38%, 100% 100%);
    background: linear-gradient(165deg, #a8c9e0, #87aecb);
    box-shadow: inset 0 6px 10px rgba(0,0,0,0.12);
  }

  .pocket::after{
    content:"";
    position:absolute;
    inset:0;
    background-image: repeating-linear-gradient(
      45deg,
      rgba(255,255,255,0.04) 0px,
      rgba(255,255,255,0.04) 2px,
      transparent 2px,
      transparent 6px
    );
  }

  .stamp{
    position:absolute;
    top: calc(var(--env-h) * 0.064);
    right: calc(var(--env-w) * 0.05);
    width: calc(var(--env-w) * 0.144);
    height: calc(var(--env-w) * 0.169);
    background: var(--cream);
    border: 2px dashed rgba(63,42,26,0.35);
    border-radius:3px;
    z-index:5;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size: clamp(18px, calc(var(--env-w) * 0.07), 30px);
    transform: rotate(4deg);
    box-shadow: 0 2px 5px rgba(0,0,0,0.15);
  }

  .address-lines{
    position:absolute;
    top: calc(var(--env-h) * 0.409);
    left: calc(var(--env-w) * 0.075);
    z-index:5;
    color: rgba(59,42,26,0.55);
    font-size: clamp(12px, calc(var(--env-w) * 0.044), 16px);
    line-height: 1.9;
    font-style: italic;
  }
  .address-lines span{
    display:block;
    border-bottom: 1px solid rgba(59,42,26,0.25);
    width: calc(var(--env-w) * 0.47);
  }

  /* top flap, the part that opens */
  .flap-top{
    position:absolute;
    top:0; left:0; right:0;
    height: calc(var(--env-h) * 0.6);
    z-index: 6;
    clip-path: polygon(0 0, 100% 0, 50% 78%);
    background: linear-gradient(155deg, #cfe4f3, #9dc3dd);
    transform-origin: top center;
    transform-style: preserve-3d;
    transition: transform 0.85s cubic-bezier(.6,0,.35,1.4);
    box-shadow: 0 4px 10px rgba(70,45,15,0.18);
  }

  .flap-top::after{
    content:"";
    position:absolute;
    inset:0;
    background-image: repeating-linear-gradient(
      45deg,
      rgba(255,255,255,0.05) 0px,
      rgba(255,255,255,0.05) 2px,
      transparent 2px,
      transparent 6px
    );
  }

  .envelope-wrap.opened .flap-top{
    transform: rotateX(180deg);
    z-index: 1;
  }

  .seal{
    position:absolute;
    top: calc(var(--env-h) * 0.391);
    left:50%;
    transform: translate(-50%, 0);
    width: calc(var(--env-w) * 0.175);
    height: calc(var(--env-w) * 0.175);
    border-radius:50%;
    background: radial-gradient(circle at 35% 30%, var(--wax) 0%, var(--wax-dark) 70%, #5e2218 100%);
    box-shadow:
      0 3px 6px rgba(0,0,0,0.35),
      inset 0 2px 3px rgba(255,255,255,0.25);
    z-index: 8;
    display:flex;
    align-items:center;
    justify-content:center;
    color: var(--cream);
    font-size: clamp(18px, calc(var(--env-w) * 0.07), 30px);
    transition: transform 0.4s ease, opacity 0.4s ease;
  }

  .envelope-wrap.opened .seal{
    transform: translate(-50%, 0) scale(0.4) rotate(25deg);
    opacity:0;
  }

  /* card peeking out, then sliding up when opened */
  .card-peek{
    position:absolute;
    left:50%;
    bottom: calc(var(--env-h) * 0.082);
    width: calc(var(--env-w) * 0.78);
    height: calc(var(--env-h) * 0.75);
    background: var(--cream);
    border-radius: 8px;
    transform: translate(-50%, 14%) scale(0.92);
    z-index: 4;
    box-shadow: 0 8px 18px rgba(80,55,20,0.25);
    transition: transform 0.9s cubic-bezier(.2,.8,.2,1.1), z-index 0.1s;
  }

  .envelope-wrap.opened .card-peek{
    transform: translate(-50%, calc(var(--env-h) * -1.1)) scale(1);
    z-index: 9;
  }

  /* ---------- THE FLIP CARD ---------- */

  .card-stage{
    width: calc(var(--env-w) * 0.78);
    height: calc(var(--env-h) * 0.75);
    perspective: 1400px;
    opacity:0;
    pointer-events:none;
    transition: opacity 0.4s ease 0.5s;
  }

  .card-stage.visible{
    opacity:1;
    pointer-events:auto;
  }

  .card-flip{
    position:relative;
    width:100%;
    height:100%;
    cursor:pointer;
    transition: transform 0.9s cubic-bezier(.4,.2,.2,1);
    transform-style: preserve-3d;
  }

  .card-flip.flipped{
    transform: rotateY(180deg);
  }

  .card-face{
    position:absolute;
    inset:0;
    border-radius: 14px;
    backface-visibility:hidden;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    box-shadow: 0 14px 30px -8px rgba(80,55,20,0.4);
  }

  .card-front{
    background:
      radial-gradient(circle at 80% 0%, rgba(232,161,61,0.35), transparent 55%),
      linear-gradient(160deg, var(--cream) 0%, #d9ecf8 100%);
    border: 1.5px solid var(--paper-line);
  }

  .card-front .sunburst{
    position:absolute;
    top:-60px;
    right:-60px;
    width:160px;
    height:160px;
    border-radius:50%;
    background: conic-gradient(from 0deg, var(--sun) 0deg 12deg, transparent 12deg 30deg);
    opacity:0.55;
  }

  .card-front .msg{
    position:relative;
    z-index:2;
    text-align:center;
    color: var(--ink);
    padding: 0 22px;
  }

  .card-front .msg .line1{
    font-size: clamp(1.3rem, calc(var(--env-w) * 0.072), 2.1rem);
    font-weight:700;
    letter-spacing:0.04em;
    text-transform: uppercase;
    color: var(--wax-dark);
  }

  .card-front .msg .line2{
    font-size: clamp(1.3rem, calc(var(--env-w) * 0.072), 2.1rem);
    font-weight:700;
    letter-spacing:0.02em;
    text-transform: uppercase;
    color: var(--pine);
    margin-top:2px;
  }

  .card-front .underline-deco{
    width: 70px;
    height: 3px;
    margin: 10px auto 0;
    background: linear-gradient(90deg, var(--sun-deep), var(--wax));
    border-radius: 2px;
  }

  .card-front .icon-row{
    margin-top: 12px;
    font-size: 1.1rem;
    letter-spacing: 10px;
  }

  .card-front .corner-deco{
    position:absolute;
    width: 16px;
    height: 16px;
    border: 2px solid var(--sun-deep);
    opacity:0.7;
  }
  .corner-tl{ top:10px; left:10px; border-right:none; border-bottom:none; }
  .corner-br{ bottom:10px; right:10px; border-left:none; border-top:none; }

  /* ----- back face: the voucher / coupon ----- */
  .card-back{
    background: linear-gradient(160deg, #fbfdff 0%, #eef5fb 100%);
    border: 1.5px dashed var(--sun-deep);
    transform: rotateY(180deg);
    color: var(--ink);
    text-align:center;
    padding: 16px 18px;
  }

  .card-back .ticket-eyebrow{
    font-size: clamp(0.6rem, calc(var(--env-w) * 0.028), 0.85rem);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--pine);
    font-weight:700;
  }

  .card-back .ticket-title{
    font-size: clamp(1.4rem, calc(var(--env-w) * 0.075), 2.2rem);
    font-weight: 800;
    color: var(--wax-dark);
    margin: 4px 0 8px;
    letter-spacing: 0.01em;
  }

  .card-back .ticket-divider{
    width:80%;
    border: none;
    border-top: 1.5px dashed var(--sun-deep);
    margin: 6px auto 8px;
    opacity:0.7;
  }

  .card-back .ticket-row{
    font-size: clamp(0.78rem, calc(var(--env-w) * 0.038), 1.1rem);
    line-height:1.55;
    color: var(--ink);
  }

  .card-back .ticket-row b{
    color: var(--pine);
    font-weight:700;
  }

  .card-back .punch{
    position:absolute;
    width:14px;
    height:14px;
    background: radial-gradient(circle, #4f9bd133, transparent 70%);
    border-radius:50%;
    border: 1.5px dashed var(--sun-deep);
    background-color: #f3f9fd;
  }
  .punch-left{ left:-8px; top:50%; transform:translateY(-50%); }
  .punch-right{ right:-8px; top:50%; transform:translateY(-50%); }

  .card-back .cheers{
    margin-top: 8px;
    font-size: 0.95rem;
    letter-spacing: 0.15em;
  }

  @media (prefers-reduced-motion: reduce){
    .flap-top, .card-peek, .card-flip, .seal{
      transition: none !important;
    }
  }
</style>
</head>
<body>

<div class="scene">

  <div class="envelope-wrap" id="envelope">
    <div class="envelope-body">
      <div class="pocket"></div>
      <div class="address-lines"><span>&nbsp;</span><span>&nbsp;</span></div>
      <div class="stamp">🚲</div>
      <div class="flap-top" id="flap"></div>
      <div class="seal" id="seal">❖</div>
      <div class="card-peek" id="cardPeek"></div>
    </div>
  </div>

  <div class="hint" id="hint">Kattints a borítékra, hogy kinyisd</div>

  <div class="card-stage" id="cardStage">
    <div class="card-flip" id="cardFlip">

      <div class="card-face card-front">
        <div class="sunburst"></div>
        <div class="corner-deco corner-tl"></div>
        <div class="corner-deco corner-br"></div>
        <div class="msg">
          <div class="line1">BOLDOG</div>
          <div class="line2">APÁK NAPJÁT!</div>
          <div class="underline-deco"></div>
          <div class="icon-row">🚲 ☁ 🚲</div>
        </div>
      </div>

      <div class="card-face card-back">
        <div class="punch punch-left"></div>
        <div class="punch punch-right"></div>
        <div class="ticket-eyebrow">Ajándékjegy</div>
        <div class="ticket-title">Fröccskupon</div>
        <hr class="ticket-divider">
        <div class="ticket-row"><b>Beváltás helye:</b><br>Ördögkatlan Fesztivál</div>
        <div class="ticket-row" style="margin-top:6px;"><b>Beváltás ideje:</b><br>2026. aug. 4–6.</div>
        <div class="cheers">🥂</div>
      </div>

    </div>
  </div>

</div>

<script>
  const envelope = document.getElementById('envelope');
  const hint = document.getElementById('hint');
  const cardStage = document.getElementById('cardStage');
  const cardFlip = document.getElementById('cardFlip');
  let opened = false;
  let flipped = false;

  envelope.addEventListener('click', () => {
    if (opened) return;
    opened = true;
    envelope.classList.add('opened');
    hint.textContent = 'Kattints a kártyára, hogy lásd a meglepetést';

    setTimeout(() => {
      cardStage.classList.add('visible');
    }, 650);
  });

  cardFlip.addEventListener('click', () => {
    if (!opened) return;
    flipped = !flipped;
    cardFlip.classList.toggle('flipped');
    hint.textContent = flipped
      ? 'Kattints újra, hogy visszafordítsd'
      : 'Kattints a kártyára, hogy megfordítsd';
  });
</script>

</body>
</html>
